<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">ChankoBlog icon</title>
  <desc id="desc">A paper-like square mark with an ink monogram for ChankoBlog.</desc>
  <style>
    :root {
      color-scheme: light dark;
    }

    .paper {
      fill: #faf9f3;
    }

    .surface {
      fill: #f3f1e9;
    }

    .ink {
      fill: #28251f;
    }

    .line {
      stroke: #d8d4c8;
    }

    .ink-line {
      stroke: #28251f;
    }

    @media (prefers-color-scheme: dark) {
      .paper {
        fill: #24211c;
      }

      .surface {
        fill: #302c25;
      }

      .ink {
        fill: #f4f0e6;
      }

      .line {
        stroke: #4b463c;
      }

      .ink-line {
        stroke: #f4f0e6;
      }
    }
  </style>
  <rect width="512" height="512" class="paper" />
